<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Employee Usage Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #5d2d91; /* Purple */
            --secondary: #ff9800; /* Orange */
            --bg: #f8fafc; /* Grayish White */
            --text-dark: #334155;
            --text-gray: #64748b;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            padding: 10px; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(93, 45, 145, 0.08); 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid #f1f5f9;
        }

        h2 { 
            text-align: center; 
            background: linear-gradient(135deg, var(--primary) 0%, #3d1d61 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px; 
            font-size: 22px; 
            font-weight: 800;
            text-transform: uppercase;
        }

        label { 
            font-weight: 600; 
            display: block; 
            margin-top: 12px; 
            color: var(--text-dark); 
            font-size: 13px;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 2px solid #f1f5f9; 
            border-radius: 14px; 
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none;
            background: #fdfdfd;
        }

        input:focus, select:focus {
            border-color: #ddd6fe;
        }
        
        #stockList { 
            max-height: 280px; 
            overflow-y: auto; 
            margin-top: 10px; 
            border-radius: 18px; 
            background: #f8fafc;
            padding: 5px;
            border: 1px solid #edf2f7;
        }

        .stock-item { 
            background: white; 
            border: 1px solid #e2e8f0; 
            padding: 14px; 
            margin-bottom: 8px; 
            border-radius: 16px; 
            cursor: pointer; 
            transition: 0.2s;
        }

        .stock-item.selected { 
            border: 2.5px solid var(--primary); 
            background: #f5f0ff; 
        }
        
        .compound-header { 
            font-weight: 700; 
            font-size: 15px; 
            color: var(--primary); 
            display: block; 
        }
        
        .batch-info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 11px; 
            color: var(--text-gray); 
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #f1f5f9;
        }

        .bal-badge { 
            float: right; 
            background: #fff3e0; 
            color: #e65100; 
            padding: 3px 10px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 11px; 
            border: 1px solid #ffcc80;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--primary) 0%, #3d1d61 100%); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            font-weight: 700; 
            font-size: 17px; 
            margin-top: 20px; 
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(93, 45, 145, 0.2);
        }

        button:active { transform: scale(0.97); }

        /* Scrollbar */
        #stockList::-webkit-scrollbar { width: 4px; }
        #stockList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Usage Entry</h2>
    
    <label>Date of Usage</label>
    <input type="date" id="usageDate">

    <label>Employee ID</label>
    <input type="text" id="empID" placeholder="Enter Your ID">

    <label>Shift</label>
    <select id="empShift">
        <option value="A">A Shift</option>
        <option value="B">B Shift</option>
        <option value="C">C Shift</option>
    </select>

    <label>Select Compound (Active Stock)</label>
    <div id="stockList">
        <p style="text-align:center; padding:15px; color:#94a3b8;">Loading stock...</p>
    </div>
    <input type="hidden" id="selectedKey">

    <label>Quantity to Use (Batch)</label>
    <input type="number" id="qtyToUse" step="0.5" placeholder="0.0">

    <button onclick="updateUsage()">UPDATE USAGE</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB4akOCR4LTOK6HyvnxwMc7SKpbrMzjNC0",
        authDomain: "compound-workaway.firebaseapp.com",
        databaseURL: "https://compound-workaway-default-rtdb.firebaseio.com",
        projectId: "compound-workaway",
        storageBucket: "compound-workaway.firebasestorage.app",
        messagingSenderId: "1020479561110",
        appId: "1:1020479561110:web:f1cb9448e2bcf9184811b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // പേജ് ലോഡ് ആകുമ്പോൾ ഓട്ടോമാറ്റിക് ആയി ID സെറ്റ് ചെയ്യുന്നു
    window.onload = function() {
        document.getElementById('usageDate').valueAsDate = new Date();
        
        // മെയിൻ പേജിൽ നിന്ന് പാസ്‌വേഡ്/ID എടുക്കുന്നു
        const savedID = localStorage.getItem("userPassword");
        if(savedID) {
            document.getElementById('empID').value = savedID;
        }
    };

    db.ref('compounds').on('value', (snapshot) => {
        const data = snapshot.val();
        const listDiv = document.getElementById('stockList');
        listDiv.innerHTML = "";

        if(!data) {
            listDiv.innerHTML = "<p style='text-align:center; padding:15px;'>No active stock.</p>";
            return;
        }

        for(let key in data) {
            const item = data[key];
            if(item.balance <= 0) continue; 

            const div = document.createElement('div');
            div.className = 'stock-item';
            div.id = 'item-' + key;
            div.onclick = () => {
                const items = document.getElementsByClassName('stock-item');
                for(let i=0; i<items.length; i++) items[i].classList.remove('selected');
                div.classList.add('selected');
                document.getElementById('selectedKey').value = key;
                if(navigator.vibrate) navigator.vibrate(30);
            };
            
            const mixWithText = item.mixingFor ? item.mixingFor : (item.ipo || 'N/A');
            
            div.innerHTML = `
                <span class="bal-badge">${item.balance} Batch Left</span>
                <span class="compound-header">${item.code} W/A ${item.wa}</span>
                <div style="font-size: 11px; color: #64748b; margin-top: 3px;">use with... ${mixWithText}</div>
                <div class="batch-info-row">
                    <span><b>Dt/Sh:</b> ${item.displayTag}</span>
                    <span><b>Skid:</b> ${item.skidNo}</span>
                    <span><b>Loc:</b> ${item.location || 'N/A'}</span>
                </div>
            `;
            listDiv.appendChild(div);
        }
    });

    function updateUsage() {
        const empID = document.getElementById('empID').value.trim();
        const usedQty = parseFloat(document.getElementById('qtyToUse').value);
        const key = document.getElementById('selectedKey').value;
        const shift = document.getElementById('empShift').value;
        const customDate = document.getElementById('usageDate').value;

        if(!empID || !key || !usedQty || !customDate) {
            return alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി നൽകുക!");
        }

        db.ref('compounds/' + key).once('value', (snap) => {
            const data = snap.val();
            if(usedQty > data.balance) {
                return alert("ശ്രദ്ധിക്കുക: " + data.balance + " Batch മാത്രമേ ബാക്കിയുള്ളൂ!");
            }

            const newBalance = (data.balance - usedQty).toFixed(1);
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const d = new Date(customDate);
            const formattedDate = d.getDate().toString().padStart(2, '0') + "/" + (d.getMonth() + 1).toString().padStart(2, '0') + "/" + d.getFullYear();

            db.ref('compounds/' + key).update({ balance: parseFloat(newBalance) });

            db.ref('compounds/' + key + '/usageHistory').push({
                empID: empID, 
                usedQty: usedQty, 
                date: formattedDate, 
                time: timeStr, 
                shift: shift, 
                timestamp: Date.now()
            }).then(() => {
                alert(usedQty + " Batch അപ്‌ഡേറ്റ് ചെയ്തു!");
                document.getElementById('qtyToUse').value = "";
                document.getElementById('selectedKey').value = "";
            });
        });
    }
</script>

<script>
    // Back button handling
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        window.location.href = "index.html";
    };

    // Vibration feedback
    if (navigator.vibrate) {
        document.querySelectorAll('button, .stock-item').forEach(el => {
            el.addEventListener('click', () => navigator.vibrate(40));
        });
    }
</script>
</body>
</html>
