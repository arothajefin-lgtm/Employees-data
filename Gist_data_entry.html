<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal - Data Entry & Restore</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #5d2d91; --success: #28a745; --danger: #dc3545; --info: #17a2b8; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-bulk { background: #6f42c1; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--success); color: white; border: none; font-weight: bold; position: sticky; bottom: 10px; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-backup { background: var(--info); color: white; border: none; font-weight: bold; cursor: pointer; width: 48%; }
        .btn-restore { background: #ffc107; color: #333; border: none; font-weight: bold; cursor: pointer; width: 48%; }
        .btn-multi-del { background: var(--danger); color: white; border: none; font-weight: bold; cursor: pointer; display: none; margin-bottom: 10px; }
        .panel { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #aaa; }
        .data-item { display: flex; align-items: center; background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 8px; border-left: 4px solid var(--primary); }
        .data-item input[type="checkbox"] { width: 30px; margin-right: 10px; }
        .data-item span { font-weight: bold; color: #555; width: 30%; font-size: 14px; }
        .data-item input[type="text"] { width: 60%; margin: 0; padding: 8px; }
        .status { text-align: center; font-weight: bold; margin: 10px 0; color: var(--primary); }
        h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 10px; justify-content: space-between; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align:center; margin-top:0; color: var(--primary);">Data Entry Portal</h3>
    <div id="status" class="status">Connecting to Firebase...</div>

    <div id="mainEditor" style="display:none;">
        <div class="panel">
            <h4>Single Add</h4>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="singleName" placeholder="Name (Eg: A1)">
                <input type="text" id="singleVal" placeholder="Value (Eg: 1000)">
            </div>
            <button class="btn-add" onclick="addSingle()">Add Item</button>
        </div>

        <div class="panel">
            <h4>Bulk Add (Range)</h4>
            <input type="text" id="bulkName" placeholder="Name Range (Eg: A1-A10)">
            <input type="text" id="bulkVal" placeholder="Value Range (Eg: 1000-1010)">
            <button class="btn-bulk" onclick="bulkAdd()">Add Bulk Range</button>
        </div>

        <div class="action-bar">
            <button class="btn-backup" onclick="downloadBackup()">Download Backup</button>
            <button class="btn-restore" onclick="triggerRestore()">Restore Backup</button>
            <input type="file" id="fileInput" accept=".json" onchange="restoreData(event)">
        </div>

        <hr>
        <input type="text" id="search" placeholder="Search data..." oninput="renderData()">
        <button id="multiDelBtn" class="btn-multi-del" onclick="deleteSelected()">Delete Selected Items</button>
        <div id="itemsContainer" style="max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 8px; background: #fff;"></div>
        <button class="btn-save" onclick="updateFirebase()">Save All Changes to Firebase</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4akOCR4LTOK6HyvnxwMc7SKpbrMzjNC0",
      authDomain: "compound-workaway.firebaseapp.com",
      databaseURL: "https://compound-workaway-default-rtdb.firebaseio.com",
      projectId: "compound-workaway",
      storageBucket: "compound-workaway.firebasestorage.app",
      messagingSenderId: "1020479561110",
      appId: "1:1020479561110:web:f1cb9448e2bcf9184811b7"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let dataList = [];

    database.ref('portalData').on('value', (snapshot) => {
        const val = snapshot.val();
        dataList = Array.isArray(val) ? val : [];
        document.getElementById('mainEditor').style.display = 'block';
        document.getElementById('status').innerText = "Sync Active ✅";
        renderData();
    });

    function addSingle() {
        const name = document.getElementById('singleName').value.trim();
        const val = document.getElementById('singleVal').value.trim();
        if(!name || !val) return alert("Fill all fields!");
        dataList.push({ "n": name, "v": val });
        renderData();
    }

    function bulkAdd() {
        const nameInput = document.getElementById('bulkName').value;
        const valInput = document.getElementById('bulkVal').value;
        const nameRange = nameInput.split('-');
        const valRange = valInput.split('-');
        if(nameRange.length !== 2 || valRange.length !== 2) return alert("Range Error!");
        try {
            const prefix = nameRange[0].match(/[a-zA-Z]+/)[0];
            const startNum = parseInt(nameRange[0].match(/\d+/)[0]);
            const endNum = parseInt(nameRange[1].match(/\d+/)[0]);
            const startVal = parseFloat(valRange[0]);
            const endVal = parseFloat(valRange[1]);
            const steps = endNum - startNum;
            const valStep = steps === 0 ? 0 : (endVal - startVal) / steps;
            for(let i = 0; i <= steps; i++) {
                dataList.push({ "n": prefix + (startNum + i), "v": (startVal + (i * valStep)).toFixed(0) });
            }
            renderData();
        } catch(e) { alert("Format Error!"); }
    }

    function triggerRestore() { document.getElementById('fileInput').click(); }

    function restoreData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let imported = JSON.parse(e.target.result);
                // പഴയ ഫോർമാറ്റ് ആണെങ്കിൽ (object with 'l' and 'w'), 'l' മാത്രം എടുക്കുന്നു
                if (!Array.isArray(imported) && imported.l && Array.isArray(imported.l)) {
                    imported = imported.l;
                }
                if (Array.isArray(imported)) {
                    if(confirm(imported.length + " ഐറ്റങ്ങൾ ലോഡ് ചെയ്യണോ?")) {
                        dataList = imported;
                        renderData();
                    }
                } else { alert("സപ്പോർട്ട് ചെയ്യാത്ത ഫയൽ!"); }
            } catch (err) { alert("Error reading file!"); }
        };
        reader.readAsText(file);
    }

    function downloadBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataList, null, 2));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", "backup.json");
        dlAnchor.click();
    }

    function renderData() {
        const container = document.getElementById('itemsContainer');
        const search = document.getElementById('search').value.toUpperCase();
        container.innerHTML = '';
        dataList.forEach((item, index) => {
            if (item.n.toUpperCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'data-item';
                div.innerHTML = `<input type="checkbox" class="del-check" data-id="${index}">
                                 <span>${item.n}</span>
                                 <input type="text" value="${item.v}" oninput="dataList[${index}].v=this.value">`;
                container.appendChild(div);
            }
        });
    }

    function deleteSelected() {
        if(!confirm("Delete?")) return;
        const checked = document.querySelectorAll('.del-check:checked');
        const indices = Array.from(checked).map(c => parseInt(c.dataset.id)).sort((a,b) => b-a);
        indices.forEach(i => dataList.splice(i, 1));
        renderData();
    }

    function updateFirebase() {
        database.ref('portalData').set(dataList).then(() => alert("Saved!"));
    }

    document.addEventListener('change', (e) => {
        if(e.target.classList.contains('del-check')) {
            const anyChecked = document.querySelectorAll('.del-check:checked').length > 0;
            document.getElementById('multiDelBtn').style.display = anyChecked ? 'block' : 'none';
        }
    });
</script>
</body>
</html>
