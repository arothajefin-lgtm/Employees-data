<!DOCTYPE html>
<html lang="ml" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Compound Wax</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            color: #333; 
        }
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            padding: 30px; 
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(93, 45, 145, 0.1);
            border: 1px solid #f1f5f9;
        }
        
        h1 { 
            text-align: center;
            background: linear-gradient(135deg, #5d2d91 0%, #3d1d61 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 26px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-group { 
            position: relative; 
            margin-bottom: 15px; 
        }
        
        .input-box { 
            width: 100%; 
            padding: 16px 50px 16px 50px; 
            font-size: 16px; 
            border: 2px solid #f1f5f9; 
            border-radius: 20px; 
            box-sizing: border-box; 
            text-transform: uppercase; 
            font-weight: 600; 
            background: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .input-box:focus {
            border-color: #5d2d91;
            background: white;
            box-shadow: 0 0 0 4px rgba(93, 45, 145, 0.1);
        }

        .input-icon { 
            position: absolute; 
            left: 18px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 20px;
            color: #64748b;
        }

        .clear-btn {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 22px;
            color: #94a3b8;
            cursor: pointer;
            padding: 5px;
            display: none;
            transition: color 0.2s;
        }

        .clear-btn:hover {
            color: #ef4444;
        }

        .clear-btn.show {
            display: block;
        }

        #suggestions { 
            border: none; 
            border-radius: 20px; 
            margin-top: 10px; 
            background: white; 
            max-height: 250px; 
            overflow-y: auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }

        .suggest-item { 
            padding: 15px; 
            border-bottom: 1px solid #f8fafc; 
            cursor: pointer; 
            font-weight: 600; 
            color: #4a5568;
            transition: background 0.2s;
        }
        
        .suggest-item:hover {
            background: #f3ebff;
            color: #5d2d91;
        }

        #resultBox { 
            display:none; 
            margin-top:25px; 
            text-align:center; 
            background: linear-gradient(135deg, #5d2d91 0%, #3d1d61 100%);
            padding: 30px; 
            border-radius: 25px; 
            color: white;
            box-shadow: 0 10px 20px rgba(61, 29, 97, 0.2);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #resCode { 
            font-weight: 600; 
            opacity: 0.9;
            font-size: 16px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .weight-display { 
            font-size: 50px; 
            font-weight: 800; 
            margin-top: 5px; 
        }

        .footer-credit { 
            text-align: center; 
            font-size: 13px; 
            color: #94a3b8; 
            margin-top: 25px; 
            font-weight: 500; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Compound Wax Search</h1>
        
        <div class="input-group">
            <span class="input-icon">🔍</span>
            <input 
                type="text" 
                id="mainSearch" 
                class="input-box" 
                placeholder="SEARCH CODE..." 
                inputmode="decimal"
                pattern="[0-9.]*"
                oninput="showSuggestions(this.value)">
            
            <button id="clearBtn" class="clear-btn">✕</button>
            
            <div id="suggestions" style="display:none;"></div>
        </div>

        <div id="resultBox">
            <div id="resCode"></div>
            <div class="weight-display"><span id="resWeight">0.00</span><span style="font-size: 20px; margin-left: 5px;">KG</span></div>
        </div>

        <div class="footer-credit">Developed by Jefin</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4akOCR4LTOK6HyvnxwMc7SKpbrMzjNC0",
            authDomain: "compound-workaway.firebaseapp.com",
            databaseURL: "https://compound-workaway-default-rtdb.firebaseio.com",
            projectId: "compound-workaway",
            storageBucket: "compound-workaway.firebasestorage.app",
            messagingSenderId: "1020479561110",
            appId: "1:1020479561110:web:f1cb9448e2bcf9184811b7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = {};

        database.ref('w').on('value', (snapshot) => { 
            db = snapshot.val() || {}; 
        });

        const searchInput = document.getElementById('mainSearch');
        const clearBtn = document.getElementById('clearBtn');

        // Clear button click
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.remove('show');
            showSuggestions('');
            searchInput.focus();
        });

        // Show/Hide clear button when typing
        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim() !== '') {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }
        });

        function showSuggestions(val) {
            const container = document.getElementById('suggestions');
            const resBox = document.getElementById('resultBox');
            
            // Only allow numbers and single decimal point
            val = val.replace(/[^0-9.]/g, '');
            
            // Prevent multiple decimal points
            const parts = val.split('.');
            if (parts.length > 2) {
                val = parts[0] + '.' + parts.slice(1).join('');
            }
            
            val = val.trim();

            container.innerHTML = '';
            
            if (!val) { 
                container.style.display = 'none'; 
                resBox.style.display = 'none';
                return; 
            }

            const matches = Object.keys(db).filter(code => 
                code.replace(/_/g, '.').includes(val)
            );
            
            if (matches.length > 0) {
                container.style.display = 'block';
                matches.forEach(code => {
                    const displayCode = code.replace(/_/g, '.');
                    const div = document.createElement('div');
                    div.className = 'suggest-item';
                    div.innerText = displayCode;
                    div.onclick = () => {
                        searchInput.value = displayCode;
                        clearBtn.classList.add('show');
                        container.style.display = 'none';
                        document.getElementById('resCode').innerText = displayCode;
                        document.getElementById('resWeight').innerText = db[code];
                        resBox.style.display = 'block';
                        try { navigator.vibrate(40); } catch(e) {}
                    };
                    container.appendChild(div);
                });
            } else { 
                container.style.display = 'none'; 
            }
        }
    </script>
</body>
</html>
