<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        body { 
            background: linear-gradient(-45deg, #ffffff, #f3e5f5, #5d2d91, #9c27b0);
            background-size: 400% 400%;
            animation: whitePurpleBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes whitePurpleBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        #login-section { text-align: center; width: 100%; }
        #main-content { display: none; width: 100%; }

        .logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .header-logo {
            width: 80%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }

        h1 { 
            color: #5d2d91; 
            margin: 0 0 25px 0; 
            font-size: 28px; 
            text-align: center; 
            font-weight: 800;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 2px solid #5d2d91;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn { 
            width: 100%; 
            padding: 20px; 
            margin: 10px 0; 
            font-size: 16px; 
            font-weight: 700; 
            border: none; 
            border-radius: 18px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            display: block; 
            transition: all 0.3s ease;
            background: #5d2d91; 
            color: white; 
            text-transform: uppercase;
        }
        
        .btn:hover { background: #4a2475; transform: translateY(-3px); }

        .footer { 
            color: #5d2d91; 
            margin-top: 25px; 
            font-size: 13px; 
            text-align: center; 
            font-weight: 600;
        }

        .logout-link {
            font-size: 12px;
            color: #5d2d91;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="logo-container">
            <img src="apollo_tyres.png" alt="Apollo Logo" class="header-logo" onclick="adminAccess()">
        </div>

        <div id="login-section">
            <h1 id="login-title">Set Password</h1>
            <p id="login-desc" style="font-size: 12px; margin-bottom: 10px;">ഏതെങ്കിലും 5 അക്ക നമ്പർ നൽകുക</p>
            <input type="number" id="passInput" placeholder="Enter 5-digit Number" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);">
            <button class="btn" onclick="handleLogin()">Submit</button>
        </div>

        <div id="main-content">
            <h1>Employee Portal</h1>
            <a href="wax_search.html" class="btn">View Wax Weight</a>
            <a href="wa_data.html" class="btn">Work Away Usage</a>
            <a href="location.html" class="btn">Tag QR & Location</a>
            
            <div class="logout-link" onclick="logout()">Reset Password</div>
        </div>

        <div class="footer">Developed by Jefin</div>
    </div>

    <script>
        window.onload = function() {
            const savedPass = localStorage.getItem("userPassword");
            const isLoggedIn = localStorage.getItem("isLoggedIn");

            if (savedPass) {
                document.getElementById("login-title").innerText = "Login";
                document.getElementById("login-desc").innerText = "നേരത്തെ നൽകിയ നമ്പർ ഉപയോഗിക്കുക";
            }

            if (isLoggedIn === "true") {
                showPortal();
            }
        };

        function handleLogin() {
            const enteredPass = document.getElementById("passInput").value;
            const savedPass = localStorage.getItem("userPassword");

            if (enteredPass.length !== 5) {
                alert("ദയവായി 5 അക്ക നമ്പർ നൽകുക!");
                return;
            }

            if (!savedPass) {
                // ആദ്യത്തെ തവണയാണെങ്കിൽ അടിച്ച നമ്പർ പാസ്‌വേഡ് ആയി സേവ് ചെയ്യുന്നു
                localStorage.setItem("userPassword", enteredPass);
                localStorage.setItem("isLoggedIn", "true");
                showPortal();
            } else if (enteredPass === savedPass) {
                // നേരത്തെ സേവ് ചെയ്ത നമ്പറാണെങ്കിൽ ലോഗിൻ ആകുന്നു
                localStorage.setItem("isLoggedIn", "true");
                showPortal();
            } else {
                alert("തെറ്റായ പാസ്‌വേഡ്!");
            }
        }

        function showPortal() {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }

        function logout() {
            if (confirm("പാസ്‌വേഡ് മാറ്റി പുതിയത് സെറ്റ് ചെയ്യണോ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function adminAccess() {
            let pass = prompt("Admin Password:");
            if (pass === "1453") {
                window.location.href = "Gist_data_entry.html"; 
            }
        }

        // --- NAVIGATION & VIBRATION ---
        (function() {
            history.pushState({page: "home"}, "");
            window.onpopstate = function() {
                if (confirm("ആപ്പിൽ നിന്ന് പുറത്ത് പോകണോ?")) {
                    navigator.app ? navigator.app.exitApp() : window.close();
                } else {
                    history.pushState({page: "home"}, "");
                }
            };
        })();

        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', () => {
                if (navigator.vibrate) navigator.vibrate(40);
            });
        });
    </script>
</body>
</html>
