<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        body { 
            background: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }
        .header-logo {
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .header-logo:hover { transform: scale(1.02); }

        /* നേരത്തെ ലോഗോയ്ക്ക് ഉപയോഗിച്ച അതേ ഡാർക്ക് പർപ്പിൾ */
        h1 { 
            color: #5d2d91; 
            margin: 0 0 35px 0; 
            font-size: 30px; 
            text-align: center; 
            font-weight: 800;
            letter-spacing: 1px;
        }

        .btn { 
            width: 100%; 
            max-width: 340px; 
            padding: 22px; 
            margin: 12px; 
            font-size: 17px; 
            font-weight: 700; 
            border: none; 
            border-radius: 18px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            display: block; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(93, 45, 145, 0.2);
            /* ബട്ടണിലും അതേ ഡാർക്ക് പർപ്പിൾ */
            background: #3d1d61; 
            color: white; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: #2e1549; /* ഹോവർ ചെയ്യുമ്പോൾ അല്പം കൂടി ഡാർക്ക് */
            transform: translateY(-3px);
            box-shadow: 0 15px 20px -5px rgba(93, 45, 145, 0.3);
        }

        .btn:active { 
            transform: scale(0.97); 
        }

        .footer { 
            color: #94a3b8; 
            margin-top: 40px; 
            font-size: 13px; 
            text-align: center; 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="apollo_tyres.png" alt="Apollo Logo" class="header-logo" onclick="checkPassword()">
    </div>

    <h1>Employee Portal</h1>

    <a href="wax_search.html" class="btn">View Wax Weight</a>
    <a href="wa_data.html" class="btn">Work Away Usage</a>
    <a href="location.html" class="btn">Tag QR & Location</a>

    <div class="footer">Developed by Jefin</div>

    <script>
        function checkPassword() {
            let pass = prompt("Enter Password:");
            if (pass === "1453") {
                window.location.href = "Gist_data_entry.html"; 
            } else if (pass !== null && pass !== "") {
                alert("Incorrect Password!");
            }
        }
    </script>
</body>
</html>
