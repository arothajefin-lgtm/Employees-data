<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            background: #e6dcf0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            overflow: hidden;
        }

        .portal-card {
            background: white;
            padding: 30px;
            border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .logo-container { margin-bottom: 5px; }
        .header-logo { width: 140px; height: auto; cursor: pointer; }

        /* പുതിയതായി ചേർത്ത BANBURY ടെക്സ്റ്റിനുള്ള സ്റ്റൈൽ */
        .banbury-text {
            color: #f15a24;
            font-size: 18px;
            font-weight: 800;
            margin: 5px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 { color: #5d2d91; margin: 10px 0 25px 0; font-size: 24px; font-weight: 800; }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 2px solid #5d2d91;
            font-size: 18px;
            text-align: center;
            outline: none;
        }

        .btn-wrap { position: relative; width: 100%; }

        .btn { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            font-size: 16px; 
            font-weight: 700; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            background: #5d2d91; 
            color: white; 
            text-transform: uppercase;
            text-decoration: none;
            display: block;
            transition: 0.2s;
            position: relative;
        }
        
        .btn:active { transform: scale(0.96); }

        .notif-badge {
            position: absolute;
            top: -5px;
            right: 5px;
            background: #ff3b3b;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 50%;
            font-weight: bold;
            border: 2px solid white;
            display: none;
            z-index: 10;
        }

        .footer { color: #5d2d91; margin-top: 15px; font-size: 13px; font-weight: 600; }
        .logout-link { font-size: 12px; color: #5d2d91; cursor: pointer; margin-top: 10px; display: block; }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 3s forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="logo-container">
            <img src="apollo_tyres.png" alt="Apollo Logo" class="header-logo" onclick="adminAccess()">
        </div>

        <div class="banbury-text">BANBURY</div>

        <div id="login-section">
            <h1 id="login-title">Login</h1>
            <input type="number" id="passInput" placeholder="•••••" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);">
            <div id="login-btn-wrap" style="position:relative;">
                <button class="btn" id="login-btn" onclick="handleLogin()">Login</button>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <h1>Employee Portal</h1>
            
            <div class="btn-wrap">
                <span id="notice-count" class="notif-badge">0</span>
                <a href="notice_board.html" class="btn" onclick="clearBadge()">View Notices</a>
            </div>

            <a href="wax_search.html" class="btn">View Wax Weight</a>
            <a href="wa_data.html" class="btn">Work Away Usage</a>
            <a href="location.html" class="btn">Tag QR & Location</a>
            <span class="logout-link" onclick="logout()">Reset Password</span>
        </div>

        <div class="footer">Developed by Jefin</div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB4akOCR4LTOK6HyvnxwMc7SKpbrMzjNC0",
            authDomain: "compound-workaway.firebaseapp.com",
            databaseURL: "https://compound-workaway-default-rtdb.firebaseio.com",
            projectId: "compound-workaway",
            storageBucket: "compound-workaway.firebasestorage.app",
            messagingSenderId: "1020479561110",
            appId: "1:1020479561110:web:f1cb9448e2bcf9184811b7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        window.onload = function() {
            if (localStorage.getItem("isLoggedIn") === "true") {
                showPortal();
                syncNoticesFromFirebase();
            }
        };

        function syncNoticesFromFirebase() {
            const noticeRef = database.ref('notices');
            noticeRef.on('value', (snapshot) => {
                const data = snapshot.val();
                let notices = [];
                if (data) {
                    notices = Object.values(data);
                }
                
                localStorage.setItem('notices', JSON.stringify(notices));
                updateNoticeBadge(notices);
            });
        }

        function updateNoticeBadge(notices) {
            const lastSeenCount = parseInt(localStorage.getItem('lastSeenNoticeCount')) || 0;
            const oneMonthAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            const activeNotices = notices.filter(n => n.timestamp > oneMonthAgo);
            
            const newCount = activeNotices.length - lastSeenCount;
            const badge = document.getElementById('notice-count');

            if (newCount > 0) {
                badge.innerText = newCount;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        function clearBadge() {
            const savedNotices = JSON.parse(localStorage.getItem('notices')) || [];
            localStorage.setItem('lastSeenNoticeCount', savedNotices.length);
        }

        function handleLogin() {
            const enteredPass = document.getElementById("passInput").value;
            const savedPass = localStorage.getItem("userPassword");
            const loginBtn = document.getElementById("login-btn");

            if (enteredPass.length !== 5) {
                alert("5 അക്ക PIN നൽകുക!");
                return;
            }

            if(navigator.vibrate) navigator.vibrate(80);
            createExplosion();
            loginBtn.innerText = "Processing...";

            setTimeout(() => {
                if (!savedPass || enteredPass === savedPass) {
                    if(!savedPass) localStorage.setItem("userPassword", enteredPass);
                    localStorage.setItem("isLoggedIn", "true");
                    showPortal();
                    syncNoticesFromFirebase();
                } else {
                    alert("Incorrect PIN!");
                    loginBtn.innerText = "Login";
                    removeParticles();
                }
            }, 3000);
        }

        function createExplosion() {
            const wrap = document.getElementById('login-btn-wrap');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = '#5d2d91';
                p.style.left = "50%"; p.style.top = "50%";
                const tx = (Math.random() - 0.5) * 150 + 'px';
                const ty = (Math.random() - 0.5) * 150 + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);
                wrap.appendChild(p);
            }
        }

        function removeParticles() { document.querySelectorAll('.particle').forEach(p => p.remove()); }

        function showPortal() {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }

        function logout() {
            if (confirm("Reset Password?")) { localStorage.clear(); location.reload(); }
        }

        function adminAccess() {
            if (prompt("Admin Password:") === "1453") window.location.href = "Gist_data_entry.html";
        }

        (function() {
            history.pushState({p:1}, "");
            window.onpopstate = function() {
                if (confirm("Exit App?")) { 
                    if (navigator.app) navigator.app.exitApp();
                    else window.close();
                }
                else history.pushState({p:1}, "");
            };
        })();
    </script>
</body>
</html>
