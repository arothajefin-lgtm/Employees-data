<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        body { 
            background: #1e272e; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
        }
        .header-logo {
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .header-logo:hover { transform: scale(1.03); }
        h1 { color: white; margin: 0 0 30px 0; font-size: 28px; text-align: center; }
        .btn { 
            width: 100%; 
            max-width: 320px; 
            padding: 20px; 
            margin: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            display: block; 
            transition: transform 0.2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.96); }
        .btn-view { background: #2ecc71; color: white; }
        .btn-use { background: #e67e22; color: white; }
        .btn-tag { background: #3498db; color: white; } 
        .footer { color: #576574; margin-top: 30px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="apollo.png" alt="Apollo Logo" class="header-logo" onclick="checkPassword()">
    </div>

    <h1>Employee Portal</h1>

    <a href="wax_search.html" class="btn btn-view">VIEW WAX WEIGHT</a>
    <a href="wa_data.html" class="btn btn-use">WORK AWAY USAGE</a>
    <a href="location.html" class="btn btn-tag">TAG QR & LOCATION</a>

    <div class="footer">Developed by Jefin</div>

    <script>
        function checkPassword() {
            let pass = prompt("Enter Password:");
            if (pass === "1453") {
                window.location.href = "Gist_data_entry.html"; 
            } else if (pass !== null && pass !== "") {
                alert("Incorrect Password!");
            }
        }
    </script>
</body>
</html>
