<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        body { 
            background: #1e272e; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; /* തിരശ്ചീനമായി മധ്യത്തിൽ */
            justify-content: center; /* ലംബമായി മധ്യത്തിൽ */
            min-height: 100vh; /* കണ്ടന്റ് കുറവാണെങ്കിലും സെന്ററിൽ നിൽക്കാൻ */
            margin: 0; 
            padding: 20px; /* മൊബൈലിൽ വശങ്ങളിൽ ഗ്യാപ്പ് കിട്ടാൻ */
            box-sizing: border-box;
        }

        /* ഇമേജ് കണ്ടെയ്നർ - കൃത്യം നടുവിൽ വരാൻ */
        .logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 400px; /* ഇമേജിന്റെ പരമാവധി വീതി */
            margin-bottom: 10px; /* ഹെഡിംഗുമായുള്ള അകലം */
        }

        /* ഹെഡിംഗ് ഇമേജ് സ്റ്റൈൽ */
        .header-logo {
            width: 100%; /* കണ്ടെയ്നറിന്റെ മുഴുവൻ വീതിയും എടുക്കും */
            height: auto; /* അനുപാതം നിലനിർത്തും */
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .header-logo:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }
        .header-logo:active {
            transform: scale(0.98);
        }

        h1 { 
            color: white; 
            margin-top: 0;
            margin-bottom: 30px; 
            font-size: 28px;
            text-align: center;
        }

        .btn { 
            width: 100%; /* മൊബൈലിൽ ഫുൾ വിഡ്ത്ത് */
            max-width: 320px; /* പരമാവധി വീതി */
            padding: 20px; 
            margin: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            display: block; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { 
            transform: scale(0.96); 
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }
        
        .btn-view { background: #2ecc71; color: white; }
        .btn-use { background: #e67e22; color: white; }
        .btn-tag { background: #3498db; color: white; } 

        .footer { 
            color: #576574; 
            margin-top: 30px; 
            font-size: 12px; 
            letter-spacing: 1px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="apollo.png" alt="Apollo Logo" class="header-logo" onclick="checkPassword()">
    </div>

    <h1>Employee Portal</h1>

    <a href="wax_view.html" class="btn btn-view">VIEW WAX WEIGHT</a>
    <a href="wa_usage.html" class="btn btn-use">WORK AWAY USAGE</a>
    <a href="index.html" class="btn btn-tag">TAG QR & LOCATION</a>

    <div class="footer">Developed by Jefin</div>

    <script>
        function checkPassword() {
            // പാസ്‌വേഡ് ചോദിക്കുന്നു
            let pass = prompt("ദയവായി പാസ്‌വേഡ് നൽകുക:");

            if (pass === "1453") {
                // പാസ്‌വേഡ് ശരിയായാൽ പോകേണ്ട പേജിന്റെ ലിങ്ക് താഴെ നൽകുക
                // ഉദാഹരണത്തിന്: "admin.html"
                window.location.href = "your_secret_page.html"; 
            } else if (pass !== null && pass !== "") {
                // പാസ്‌വേഡ് തെറ്റായാൽ
                alert("തെറ്റായ പാസ്‌വേഡ്! വീണ്ടും ശ്രമിക്കുക.");
            }
        }
    </script>

</body>
</html>
