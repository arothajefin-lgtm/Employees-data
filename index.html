<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        body { 
            /* White to Purple Gradient Settings */
            background: linear-gradient(-45deg, #ffffff, #f3e5f5, #5d2d91, #9c27b0);
            background-size: 400% 400%;
            animation: whitePurpleBG 15s ease infinite;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* ആനിമേഷൻ കീഫ്രെയിംസ് */
        @keyframes whitePurpleBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ബാക്ക്ഗ്രൗണ്ടിന് മുകളിൽ കണ്ടന്റ് വ്യക്തമാകാൻ ഒരു ചെറിയ ഗ്ലാസ് ഇഫക്റ്റ് */
        .portal-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .header-logo {
            width: 80%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .header-logo:hover { transform: scale(1.05); }

        h1 { 
            color: #5d2d91; 
            margin: 0 0 25px 0; 
            font-size: 28px; 
            text-align: center; 
            font-weight: 800;
            letter-spacing: 1px;
        }

        .btn { 
            width: 100%; 
            padding: 20px; 
            margin: 10px 0; 
            font-size: 16px; 
            font-weight: 700; 
            border: none; 
            border-radius: 18px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            display: block; 
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(93, 45, 145, 0.2);
            background: #5d2d91; 
            color: white; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-sizing: border-box;
        }
        
        .btn:hover {
            background: #4a2475;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(93, 45, 145, 0.3);
        }

        .btn:active { transform: scale(0.97); }

        .footer { 
            color: #5d2d91; 
            margin-top: 25px; 
            font-size: 13px; 
            text-align: center; 
            font-weight: 600;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="logo-container">
            <img src="apollo_tyres.png" alt="Apollo Logo" class="header-logo" onclick="checkPassword()">
        </div>

        <h1>Employee Portal</h1>

        <a href="wax_search.html" class="btn">View Wax Weight</a>
        <a href="wa_data.html" class="btn">Work Away Usage</a>
        <a href="location.html" class="btn">Tag QR & Location</a>

        <div class="footer">Developed by Jefin</div>
    </div>

    <script>
        function checkPassword() {
            let pass = prompt("Enter Password:");
            if (pass === "1453") {
                window.location.href = "Gist_data_entry.html"; 
            } else if (pass !== null && pass !== "") {
                alert("Incorrect Password!");
            }
        }
    </script>
</body>
</html>
