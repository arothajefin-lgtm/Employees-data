<!DOCTYPE html>
<html lang="ml" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tool Box - Jeffin</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Poppins', sans-serif; background: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
    .page { display: none; width: 100%; padding: 15px; }
    .page.active { display: flex; flex-direction: column; align-items: center; }
    .main-title { background: linear-gradient(135deg, #5d2d91 0%, #3d1d61 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
    .glass-card { background: white; padding: 20px; border-radius: 35px; box-shadow: 0 10px 30px rgba(93, 45, 145, 0.1); width: 100%; max-width: 400px; text-align: center; border: 1px solid #f1f5f9; }
    .btn-purple { background: linear-gradient(135deg, #5d2d91 0%, #3d1d61 100%); color: white; transition: all 0.3s ease; }
    
    .alpha-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; width: 100%; }
    .alpha-btn { background: #f8fafc; padding: 12px 0; border-radius: 15px; font-weight: 700; color: #5d2d91; border: 1px solid #e2e8f0; font-size: 16px; transition: 0.2s; }
    .alpha-btn.active { background: #5d2d91; color: white; border-color: #5d2d91; }

    #qrcode-tag, #qrcode-loc { background: #fff; padding: 15px; border: 1px solid #e2e8f0; border-radius: 24px; display: flex; justify-content: center; margin: 15px auto; }
    .list-container { max-height: 280px; overflow-y: auto; width: 100%; padding: 5px; }
    .list-item { padding: 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-weight: 600; color: #4a5568; text-align: left; background: #f8fafc; margin-bottom: 6px; border-radius: 12px; }
    .btn-press:active { transform: scale(0.95); }
</style>
</head>

<body>

<div id="homePage" class="page active">
    <h1 class="text-3xl main-title mb-8">My Tool Box</h1>
    <div class="w-full max-w-sm">
        <div class="btn-purple p-10 rounded-[40px] shadow-lg cursor-pointer text-center btn-press mb-6" onclick="feedback(); showPage('tagPage')">
            <div class="text-6xl mb-4">🏷️</div>
            <h3 class="text-2xl font-bold">Tag ➔ Location</h3>
            <p class="opacity-80 text-sm mt-1">Select Tag & Find Location</p>
        </div>
        <div class="p-6 bg-white rounded-3xl shadow-sm border text-center">
            <h4 id="syncStatus" class="font-bold text-slate-700 mb-3 text-sm">Cloud Sync (Firebase)</h4>
            <button onclick="syncWithFirebase(); feedback()" id="syncBtn" class="w-full btn-purple py-4 rounded-2xl font-bold text-sm btn-press">Sync Now</button>
        </div>
    </div>
    <div class="footer mt-10 text-gray-400 text-sm">Developed by Jefin</div>
</div>

<div id="tagPage" class="page">
    <div class="glass-card">
        <div class="flex justify-between w-full mb-4">
            <button onclick="feedback(); showPage('homePage')" class="text-gray-400 text-xl">✕</button>
            <h2 class="font-bold text-slate-700 uppercase tracking-wider">QR Tag</h2>
            <div></div>
        </div>
        <div class="flex gap-4 w-full mb-4">
            <button onclick="changeTag(-1); feedback()" class="flex-1 bg-slate-50 py-4 rounded-2xl font-bold text-slate-600 border border-slate-100">PREV</button>
            <button onclick="changeTag(1); feedback()" class="flex-1 bg-slate-50 py-4 rounded-2xl font-bold text-slate-600 border border-slate-100">NEXT</button>
        </div>
        <input type="number" id="tagInp" value="0000000" oninput="drawTag()" class="text-4xl w-full text-center font-bold text-purple-900 mb-4 focus:outline-none bg-transparent">
        <div id="qrcode-tag"></div>
        <div id="tagTxt" class="text-xl font-bold text-orange-500 mb-6 tracking-widest">0000000</div>
        <button onclick="feedback(); showPage('locPage')" class="w-full btn-purple py-5 rounded-2xl font-bold shadow-lg btn-press">OK ➔ SELECT LOCATION</button>
    </div>
</div>

<div id="locPage" class="page">
    <div class="glass-card">
        <div class="flex justify-between w-full mb-4">
            <button onclick="feedback(); showPage('tagPage')" class="text-purple-700 font-bold">← BACK</button>
            <h2 class="font-bold text-slate-700 uppercase tracking-wider">Location</h2>
            <div></div>
        </div>

        <div class="alpha-grid" id="alphaGrid"></div>
        
        <div id="locList" class="list-container mb-2"></div>

        <div id="locQRDisplay" class="hidden">
            <div id="qrcode-loc"></div>
            <div id="locValDisplay" class="font-bold mb-3 text-purple-800 text-xl"></div>
            <button onclick="resetLocView(); feedback()" class="mb-4 text-xs text-purple-500 font-bold underline">Change Location</button>
        </div>
        
        <button onclick="finishProcess(); feedback()" class="w-full btn-purple py-5 rounded-2xl font-bold shadow-lg btn-press">FINISH</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB4akOCR4LTOK6HyvnxwMc7SKpbrMzjNC0",
  authDomain: "compound-workaway.firebaseapp.com",
  databaseURL: "https://compound-workaway-default-rtdb.firebaseio.com",
  projectId: "compound-workaway",
  storageBucket: "compound-workaway.firebasestorage.app",
  messagingSenderId: "1020479561110",
  appId: "1:1020479561110:web:f1cb9448e2bcf9184811b7"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

function feedback(){ try{ navigator.vibrate(50); let ctx=new (window.AudioContext||window.webkitAudioContext)(); let osc=ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.1); }catch(e){} }

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='locPage') initLocPage();
}

let locDB = JSON.parse(localStorage.getItem('j_loc_v7')) || [];

database.ref('portalData').on('value', (snapshot) => {
    const val = snapshot.val();
    if(val) { locDB = val; localStorage.setItem('j_loc_v7', JSON.stringify(val)); }
});

// Tag Logic
var qrTag=new QRCode(document.getElementById("qrcode-tag"),{width:180,height:180});
function drawTag(){
    let v=document.getElementById("tagInp").value||"0";
    qrTag.makeCode("|"+v);
    document.getElementById("tagTxt").innerText=v.toString().padStart(7,'0');
}
function changeTag(d){
    let i=document.getElementById("tagInp");
    let n=(parseInt(i.value||0)+d);
    if(n>=0){ i.value=n.toString().padStart(7,'0'); drawTag(); }
}

// Location Logic
var qrLoc=new QRCode(document.getElementById("qrcode-loc"),{width:180,height:180});

function initLocPage() {
    const grid = document.getElementById('alphaGrid');
    grid.innerHTML = "";
    
    // ഡാറ്റാബേസിലുള്ള ആദ്യത്തെ അക്ഷരങ്ങൾ (Unique Letters) കണ്ടെത്തുന്നു
    let availableChars = [...new Set(locDB.map(item => item.n.charAt(0).toUpperCase()))];
    availableChars.sort(); // അക്ഷരമാലാക്രമത്തിൽ നിരത്തുന്നു

    availableChars.forEach(char => {
        let btn = document.createElement('button');
        btn.className = "alpha-btn";
        btn.innerText = char;
        btn.onclick = () => { 
            document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterByAlpha(char);
            feedback();
        };
        grid.appendChild(btn);
    });
    resetLocView();
}

function filterByAlpha(char) {
    document.getElementById('locQRDisplay').classList.add('hidden');
    const c = document.getElementById('locList');
    c.innerHTML = "";
    const filtered = locDB.filter(x => x.n.toUpperCase().startsWith(char));
    
    filtered.forEach(item => {
        let d = document.createElement('div');
        d.className = "list-item";
        d.innerText = item.n;
        d.onclick = () => { selectLoc(item); feedback(); }
        c.appendChild(d);
    });
}

function selectLoc(item){
    document.getElementById('locQRDisplay').classList.remove('hidden');
    document.getElementById('locValDisplay').innerText = item.n;
    qrLoc.makeCode(item.v);
    document.getElementById('locList').innerHTML = "";
    document.getElementById('alphaGrid').style.display = "none";
}

function resetLocView() {
    document.getElementById('locQRDisplay').classList.add('hidden');
    document.getElementById('locList').innerHTML = "";
    document.getElementById('alphaGrid').style.display = "grid";
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
}

function finishProcess(){
    resetLocView();
    showPage('tagPage');
}

function syncWithFirebase() {
    const btn = document.getElementById('syncBtn');
    btn.innerText = "Syncing...";
    database.ref('portalData').once('value').then((snapshot) => {
        const val = snapshot.val();
        if (val) {
            locDB = val;
            localStorage.setItem('j_loc_v7', JSON.stringify(val));
            alert("Sync Success!");
        }
        btn.innerText = "Sync Now";
    }).catch(e => { btn.innerText = "Sync Now"; });
}

drawTag();
</script>
</body>
</html>
