<!DOCTYPE html>
<html lang="ml" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tool Box - Jeffin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #ffffff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .page { display: none; width: 100%; padding: 15px; }
    .page.active { display: flex; flex-direction: column; align-items: center; }

    /* പർപ്പിൾ ഗ്രേഡിയന്റ് ഹെഡിംഗ് */
    .main-title {
        background: linear-gradient(135deg, #5d2d91 0%, #3d1d61 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    .glass-card {
        background: white;
        padding: 25px;
        border-radius: 35px;
        box-shadow: 0 10px 30px rgba(93, 45, 145, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
        border: 1px solid #f1f5f9;
    }

    /* പർപ്പിൾ ബട്ടൺ സ്റ്റൈൽ */
    .btn-purple {
        background: linear-gradient(135deg, #5d2d91 0%, #3d1d61 100%);
        color: white;
        transition: all 0.3s ease;
    }
    .btn-purple:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(61, 29, 97, 0.3);
    }

    #qrcode-tag, #qrcode-loc {
        background: #fff;
        padding: 15px;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        display: flex;
        justify-content: center;
        margin: 15px auto;
    }

    .list-container {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        margin-top: 10px;
        width: 100%;
    }

    .list-item {
        padding: 14px;
        border-bottom: 1px solid #f1f5f9;
        cursor: pointer;
        font-weight: 600;
        color: #4a5568;
    }

    .list-item.selected {
        background: #5d2d91;
        color: white;
    }

    .btn-press:active { transform: scale(0.95); }
</style>
</head>

<body>

<div id="homePage" class="page active">
    <h1 class="text-3xl main-title mb-8">My Tool Box</h1>

    <div class="w-full max-w-sm">
        <div class="btn-purple p-10 rounded-[40px] shadow-lg cursor-pointer text-center btn-press mb-6" onclick="feedback(); showPage('tagPage')">
            <div class="text-6xl mb-4">🏷️</div>
            <h3 class="text-2xl font-bold">Tag ➔ Location</h3>
            <p class="opacity-80 text-sm mt-1">Select Tag & Find Location</p>
        </div>

        <div class="p-6 bg-white rounded-3xl shadow-sm border text-center">
            <h4 class="font-bold text-slate-700 mb-3 text-sm">Cloud Sync</h4>
            <button onclick="fetchLocFromGist(); feedback()" id="syncBtn" class="w-full btn-purple py-4 rounded-2xl font-bold text-sm btn-press">
                Sync Locations
            </button>
        </div>

        <div class="mt-6 flex gap-2 text-xs">
            <input type="file" id="restoreFile" hidden onchange="restoreFromFile(event)">
            <button onclick="document.getElementById('restoreFile').click(); feedback()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold">Restore</button>
            <button onclick="backupData(); feedback()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold">Backup</button>
        </div>
    </div>

    <div class="footer mt-10 text-gray-400 text-sm">Developed by Jefin</div>
</div>

<div id="tagPage" class="page">
    <div class="glass-card">
        <div class="flex justify-between w-full mb-4">
            <button onclick="feedback(); showPage('homePage')" class="text-gray-400 text-xl">✕</button>
            <h2 class="font-bold text-slate-700 uppercase tracking-wider">QR Tag</h2>
            <div></div>
        </div>
        <div class="flex gap-4 w-full mb-4">
            <button onclick="changeTag(-1); feedback()" class="flex-1 bg-slate-50 py-4 rounded-2xl font-bold text-slate-600 border border-slate-100">PREV</button>
            <button onclick="changeTag(1); feedback()" class="flex-1 bg-slate-50 py-4 rounded-2xl font-bold text-slate-600 border border-slate-100">NEXT</button>
        </div>
        <input type="number" id="tagInp" value="0000000" oninput="drawTag()" class="text-4xl w-full text-center font-bold text-purple-900 mb-4 focus:outline-none bg-transparent">
        <div id="qrcode-tag"></div>
        <div id="tagTxt" class="text-xl font-bold text-orange-500 mb-6 tracking-widest">0000000</div>
        <button onclick="feedback(); showPage('locPage')" class="w-full btn-purple py-5 rounded-2xl font-bold shadow-lg btn-press">OK ➔ SELECT LOCATION</button>
    </div>
</div>

<div id="locPage" class="page">
    <div class="glass-card">
        <div class="flex justify-between w-full mb-4">
            <button onclick="feedback(); showPage('tagPage')" class="text-purple-700 font-bold">← BACK</button>
            <h2 class="font-bold text-slate-700 uppercase tracking-wider">Location</h2>
            <div></div>
        </div>
        <input type="text" id="locSearch" placeholder="Search Location..." oninput="filterLocs(this.value)" class="w-full p-4 border border-slate-100 rounded-2xl mb-2 text-center focus:ring-2 focus:ring-purple-200 outline-none bg-slate-50">
        
        <div id="locQRDisplay" class="hidden">
            <div id="qrcode-loc"></div>
            <div id="locValDisplay" class="font-bold mb-3 text-purple-800 text-xl"></div>
        </div>
        
        <div id="locList" class="list-container mb-4"></div>
        <button onclick="finishProcess(); feedback()" class="w-full btn-purple py-5 rounded-2xl font-bold shadow-lg btn-press">FINISH</button>
    </div>
</div>

<script>
// നിങ്ങളുടെ GIST ID
const GIST_ID = "49987c77b5f42d688ba07c9e82e846f9";
const GIST_API = `https://api.github.com/gists/${GIST_ID}`;

function feedback(){ try{ navigator.vibrate(50); let ctx=new (window.AudioContext||window.webkitAudioContext)(); let osc=ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.1); }catch(e){} }

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='locPage') renderLocList();
}

/* SYNC LOGIC - UPDATED FOR YOUR DATA FORMAT */
async function fetchLocFromGist() {
    const btn = document.getElementById('syncBtn');
    btn.innerText = "Syncing..."; btn.disabled = true;

    try {
        const response = await fetch(GIST_API + "?t=" + new Date().getTime());
        if (!response.ok) throw new Error("Gist not found");
        const data = await response.json();
        
        const firstFileKey = Object.keys(data.files)[0];
        const content = JSON.parse(data.files[firstFileKey].content);
        
        // നിങ്ങളുടെ JSON-ലെ 'l' കീയിലെ ഡാറ്റ മാത്രം എടുക്കുന്നു
        if(content.l) {
            localStorage.setItem('j_loc_v7', JSON.stringify(content.l));
            alert("Sync Success! " + content.l.length + " Locations updated.");
            location.reload();
        } else {
            alert("Error: 'l' key missing in Gist JSON!");
        }
    } catch (e) {
        console.error(e);
        alert("Sync Failed! Check internet or Gist format.");
    } finally {
        btn.innerText = "Sync Locations"; btn.disabled = false;
    }
}

/* TAG LOGIC */
var qrTag=new QRCode(document.getElementById("qrcode-tag"),{width:180,height:180});
function drawTag(){
    let v=document.getElementById("tagInp").value||"0";
    qrTag.makeCode("|"+v);
    document.getElementById("tagTxt").innerText=v.toString().padStart(7,'0');
}
function changeTag(d){
    let i=document.getElementById("tagInp");
    let n=(parseInt(i.value||0)+d);
    if(n>=0){ i.value=n.toString().padStart(7,'0'); drawTag(); }
}

/* LOCATION LOGIC */
let locDB=JSON.parse(localStorage.getItem('j_loc_v7'))||[];
var qrLoc=new QRCode(document.getElementById("qrcode-loc"),{width:180,height:180});
let selectedLocValue="";

function renderLocList(filter=""){
    const c=document.getElementById('locList'); if(!c) return;
    c.innerHTML="";
    const filtered = locDB.filter(x=>x.n.toLowerCase().includes(filter.toLowerCase()));
    if(filtered.length === 0) { c.innerHTML = "<div class='p-4 text-gray-400'>No results</div>"; return; }
    filtered.forEach(item=>{
        let d=document.createElement('div');
        d.className="list-item";
        if(selectedLocValue===item.v) d.classList.add('selected');
        d.innerText=item.n;
        d.onclick=()=>{selectLoc(item);feedback();}
        c.appendChild(d);
    });
}

function filterLocs(v){renderLocList(v);}

function selectLoc(item){
    selectedLocValue=item.v;
    document.getElementById('locQRDisplay').classList.remove('hidden');
    document.getElementById('locValDisplay').innerText=item.n;
    qrLoc.makeCode(item.v);
    renderLocList(document.getElementById('locSearch').value);
}

function finishProcess(){
    selectedLocValue="";
    document.getElementById('locQRDisplay').classList.add('hidden');
    showPage('homePage');
}

/* BACKUP & RESTORE */
function backupData(){
    let data = { l: JSON.parse(localStorage.getItem('j_loc_v7')||"[]") };
    let blob = new Blob([JSON.stringify(data)],{type:"application/json"});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "location_backup.json"; a.click();
}

function restoreFromFile(e){
    let r = new FileReader();
    r.onload = x => {
        try {
            let d = JSON.parse(x.target.result);
            localStorage.setItem('j_loc_v7', JSON.stringify(d.l));
            alert("Restore Complete!"); location.reload();
        } catch(err) { alert("Error!"); }
    };
    r.readAsText(e.target.files[0]);
}

drawTag();
</script>
</body>
</html>
